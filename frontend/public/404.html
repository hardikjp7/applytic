<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Applytic</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Stores the path in sessionStorage then redirects to index.html
    // index.html then reads it and pushes the correct route
    var path = window.location.pathname;
    var base = '/applytic';
    var route = path.replace(base, '') || '/';
    sessionStorage.setItem('redirect', route);
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
